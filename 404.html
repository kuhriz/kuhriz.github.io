<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Navi's PC Cafe</title>
<meta name="robots" content="noindex">
<script>
// Map old GitHub Pages paths to their new homes, preserving query + hash
// (old promo-email unsubscribe links and buyer bookmarks land here).
(function () {
  var p = location.pathname, target;
  if (p.indexOf('/natpc-admin') === 0) {
    target = 'https://admin.navipcshop.com' + p.replace(/^\/natpc-admin\/?/, '/');
  } else {
    target = 'https://navipcshop.com' + p.replace(/^\/natpc-shop\/?/, '/');
  }
  target = target.replace(/\/index\.html$/, '/');
  location.replace(target + location.search + location.hash);
})();
</script>
<noscript><meta http-equiv="refresh" content="0;url=https://navipcshop.com/"></noscript>
